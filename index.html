<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricIntel - Fantasy Cricket Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --bg-hover: #252b3d;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --accent-pink: #ec4899;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .app-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .stat-item {
            text-align: right;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 2.5rem 0 1.5rem;
        }

        .section-icon {
            font-size: 1.25rem;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .match-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .match-card:hover {
            background: var(--bg-hover);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        .match-card:hover::before {
            opacity: 1;
        }

        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .team-name {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .team-home {
            color: var(--accent-blue);
        }

        .team-away {
            color: var(--accent-pink);
        }

        .vs-divider {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .match-venue {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 0.75rem;
        }

        .match-tag {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.75rem;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-blue);
        }

        .team-selector {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 3rem;
        }

        .selector-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .team-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 1rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .team-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .team-btn.selected {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .analyze-btn {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border: none;
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .analyze-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }

        .analyze-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .results-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            margin-top: 2rem;
            display: none;
        }

        .results-panel.active {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-state {
            text-align: center;
            padding: 3rem 1rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .result-section {
            margin-bottom: 2rem;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .result-icon {
            font-size: 1.5rem;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .dream11-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .player-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            transition: all 0.2s ease;
        }

        .player-card:hover {
            border-color: var(--accent-green);
            transform: translateY(-2px);
        }

        .player-rank {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .player-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .player-role {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .player-points {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .pitch-info {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .pitch-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .pitch-row:last-child {
            border-bottom: none;
        }

        .pitch-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .pitch-value {
            font-size: 0.85rem;
            color: var(--text-primary);
            font-weight: 700;
        }

        .tips-list {
            list-style: none;
        }

        .tip-item {
            background: var(--bg-card);
            border-left: 3px solid var(--accent-blue);
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .error-alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            display: none;
        }

        .error-alert.active {
            display: block;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .stats-bar {
                width: 100%;
                justify-content: space-around;
            }

            .matches-grid {
                grid-template-columns: 1fr;
            }

            .teams-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo-icon">⚡</div>
                <div>
                    <div class="logo-text">CricIntel</div>
                    <div class="tagline">Fantasy Cricket Intelligence</div>
                </div>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="predictionCount">0</div>
                    <div class="stat-label">Predictions</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">73%</div>
                    <div class="stat-label">Avg Accuracy</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="matchCount">0</div>
                    <div class="stat-label">Total Matches</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="error-alert" id="errorAlert"></div>

        <div class="section-header">
            <span class="section-icon">⚡</span>
            <span class="section-title">Quick Analyze — One Tap</span>
        </div>

        <div class="matches-grid" id="matchesGrid"></div>

        <div class="section-header">
            <span class="section-icon">✏️</span>
            <span class="section-title">Or Pick Teams Manually</span>
        </div>

        <div class="team-selector">
            <div class="selector-title">Select Team 1 (Home)</div>
            <div class="teams-grid" id="homeTeamsGrid"></div>

            <div class="selector-title" style="margin-top: 2rem;">Select Team 2 (Away)</div>
            <div class="teams-grid" id="awayTeamsGrid"></div>

            <button class="analyze-btn" id="analyzeBtn" disabled>
                Analyze Match
            </button>
        </div>

        <div class="results-panel" id="resultsPanel">
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <div class="loading-text">Analyzing match data...</div>
            </div>
            <div id="resultsContent" style="display: none;"></div>
        </div>
    </div>

    <script>
        const IPL_TEAMS = [

        const PLAYERS_DB = {

                { name: 'Jasprit Bumrah', role: 'Bowler', pts: 9.0, team: 'MI' },

            ],

            ],

                { name: 'Shikhar Dhawan', role: 'Batsman (C)', pts: 8.5, team: 'PBKS' },
                { name: 'Kagiso Rabada', role: 'Bowler', pts: 8.5, team: 'PBKS' },

                { name: 'Jonny Bairstow', role: 'Wicket-Keeper', pts: 8.0, team: 'PBKS' }
            ],
            'RR': [
                { name: 'Sanju Samson', role: 'Wicket-Keeper (C)', pts: 8.5, team: 'RR' },
                { name: 'Jos Buttler', role: 'Batsman', pts: 9.0, team: 'RR' },

            ],
            'SRH': [
                { name: 'Aiden Markram', role: 'Batsman (C)', pts: 8.5, team: 'SRH' },
                { name: 'Heinrich Klaasen', role: 'Wicket-Keeper', pts: 8.5, team: 'SRH' },
                { name: 'Abhishek Sharma', role: 'All-Rounder', pts: 8.0, team: 'SRH' },
                { name: 'Bhuvneshwar Kumar', role: 'Bowler', pts: 8.0, team: 'SRH' },
                { name: 'Umran Malik', role: 'Bowler', pts: 7.5, team: 'SRH' }
            ],
            'GT': [
                { name: 'Shubman Gill', role: 'Batsman (C)', pts: 9.0, team: 'GT' },
                { name: 'Rashid Khan', role: 'All-Rounder', pts: 9.0, team: 'GT' },

                { name: 'David Miller', role: 'Batsman', pts: 8.5, team: 'GT' },
                { name: 'Hardik Pandya', role: 'All-Rounder', pts: 9.0, team: 'GT' }
            ],
            'LSG': [
                { name: 'KL Rahul', role: 'Batsman (C)', pts: 9.0, team: 'LSG' },
                { name: 'Marcus Stoinis', role: 'All-Rounder', pts: 8.5, team: 'LSG' },
                { name: 'Quinton de Kock', role: 'Wicket-Keeper', pts: 8.5, team: 'LSG' },
                { name: 'Ravi Bishnoi', role: 'Bowler', pts: 8.0, team: 'LSG' },
                { name: 'Krunal Pandya', role: 'All-Rounder', pts: 7.5, team: 'LSG' }
            ]
        };

        let selectedHome = null;
        let selectedAway = null;
        let predCount = 0;

        function init() {
            renderMatches();
            renderTeamSelectors();
            updateMatchCount();
        }

        function renderMatches() {
            const grid = document.getElementById('matchesGrid');
            grid.innerHTML = '';

            IPL_MATCHES.forEach(match => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div class="match-teams">
                        <span class="team-name team-home">${match.home}</span>
                        <span class="vs-divider">VS</span>
                        <span class="team-name team-away">${match.away}</span>
                    </div>
                    <div class="match-venue">
                        <span>📍</span>
                        <span>${match.venue}</span>
                    </div>
                    <div class="match-tag">${match.type}</div>
                `;
                card.addEventListener('click', () => analyzeMatch(match.home, match.away, match.venue));
                grid.appendChild(card);
            });
        }

        function renderTeamSelectors() {
            const homeGrid = document.getElementById('homeTeamsGrid');
            const awayGrid = document.getElementById('awayTeamsGrid');

            IPL_TEAMS.forEach(team => {
                const homeBtn = createTeamButton(team, 'home');
                const awayBtn = createTeamButton(team, 'away');
                homeGrid.appendChild(homeBtn);
                awayGrid.appendChild(awayBtn);
            });
        }

        function createTeamButton(team, type) {
            const btn = document.createElement('button');
            btn.className = 'team-btn';
            btn.textContent = team.code;
            btn.addEventListener('click', () => selectTeam(team.code, type, btn));
            return btn;
        }

        function selectTeam(code, type, btn) {
            const grid = type === 'home' ? 'homeTeamsGrid' : 'awayTeamsGrid';
            document.querySelectorAll(`#${grid} .team-btn`).forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');

            if (type === 'home') {
                selectedHome = code;
            } else {
                selectedAway = code;
            }

            updateAnalyzeButton();
        }

        function updateAnalyzeButton() {
            const btn = document.getElementById('analyzeBtn');
            btn.disabled = !(selectedHome && selectedAway && selectedHome !== selectedAway);
        }

        document.getElementById('analyzeBtn').addEventListener('click', () => {
            if (selectedHome && selectedAway) {
                const venue = 'Selected Venue';
                analyzeMatch(selectedHome, selectedAway, venue);
            }
        });

        async function analyzeMatch(home, away, venue) {
            const panel = document.getElementById('resultsPanel');
            const loading = document.getElementById('loadingState');
            const content = document.getElementById('resultsContent');
            const errorAlert = document.getElementById('errorAlert');

            panel.classList.add('active');
            loading.style.display = 'block';
            content.style.display = 'none';
            errorAlert.classList.remove('active');

            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            try {
                await new Promise(resolve => setTimeout(resolve, 1200));

                // Try API first, fallback to local data
                let data;
                try {
                    data = await fetchLiveData(home, away);
                } catch {
                    data = generateLocalAnalysis(home, away, venue);
                }

                displayResults(data);
                predCount++;
                document.getElementById('predictionCount').textContent = predCount;

            } catch (error) {
                showError('Analysis failed. Please try again.');
                console.error(error);
            } finally {
                loading.style.display = 'none';
            }
        }

        async function fetchLiveData(home, away) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);

            try {
                const response = await fetch('https://api.cricapi.com/v1/match_info', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) throw new Error('API failed');
                return await response.json();
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        function generateLocalAnalysis(home, away, venue) {
            const homeTeam = IPL_TEAMS.find(t => t.code === home);
            const awayTeam = IPL_TEAMS.find(t => t.code === away);

            const homePlayers = (PLAYERS_DB[home] || []).map(p => ({...p, team: home}));
            const awayPlayers = (PLAYERS_DB[away] || []).map(p => ({...p, team: away}));

            const allPlayers = [...homePlayers, ...awayPlayers]
                .sort((a, b) => b.pts - a.pts)
                .slice(0, 11);

            const pitchTypes = ['Batting Paradise', 'Balanced Track', 'Spin-Friendly', 'Pace & Bounce'];
            const pitch = pitchTypes[Math.floor(Math.random() * pitchTypes.length)];

            return {
                matchup: `${homeTeam.name} vs ${awayTeam.name}`,
                venue: venue,
                dream11: allPlayers,
                pitch: {
                    type: pitch,
                    score: Math.floor(Math.random() * 30) + 165,
                    description: `Expected to be a ${pitch.toLowerCase()} with good pace and bounce.`
                },
                tips: [
                    `${allPlayers[0].name} is in excellent form - consider as captain`,
                    'Weather forecast shows clear skies throughout the match',
                    'Toss winning team likely to bat first on this surface',
                    'Dew factor expected in second innings'
                ]
            };
        }

        function displayResults(data) {
            const content = document.getElementById('resultsContent');

            let html = `
                <div class="result-section">
                    <div class="result-header">
                        <span class="result-icon">🏏</span>
                        <span class="result-title">Match Overview</span>
                    </div>
                    <div class="pitch-info">
                        <div class="pitch-row">
                            <span class="pitch-label">Matchup</span>
                            <span class="pitch-value">${data.matchup}</span>
                        </div>
                        <div class="pitch-row">
                            <span class="pitch-label">Venue</span>
                            <span class="pitch-value">${data.venue}</span>
                        </div>
                    </div>
                </div>

                <div class="result-section">
                    <div class="result-header">
                        <span class="result-icon">🏆</span>
                        <span class="result-title">Dream11 Fantasy XI</span>
                    </div>
                    <div class="dream11-grid">
            `;

            data.dream11.forEach((p, i) => {
                html += `
                    <div class="player-card">
                        <div class="player-rank">#${i + 1}</div>
                        <div class="player-name">${p.name}</div>
                        <div class="player-role">${p.role} • ${p.team}</div>
                        <div class="player-points">⭐ ${p.pts} pts</div>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>

                <div class="result-section">
                    <div class="result-header">
                        <span class="result-icon">📊</span>
                        <span class="result-title">Pitch Report</span>
                    </div>
                    <div class="pitch-info">
                        <div class="pitch-row">
                            <span class="pitch-label">Surface Type</span>
                            <span class="pitch-value">${data.pitch.type}</span>
                        </div>
                        <div class="pitch-row">
                            <span class="pitch-label">Expected 1st Innings</span>
                            <span class="pitch-value">${data.pitch.score}+</span>
                        </div>
                        <div class="pitch-row">
                            <span class="pitch-label">Analysis</span>
                            <span class="pitch-value">${data.pitch.description}</span>
                        </div>
                    </div>
                </div>

                <div class="result-section">
                    <div class="result-header">
                        <span class="result-icon">💡</span>
                        <span class="result-title">Pro Tips</span>
                    </div>
                    <ul class="tips-list">
            `;

            data.tips.forEach(tip => {
                html += `<li class="tip-item">${tip}</li>`;
            });

            html += `
                    </ul>
                </div>
            `;

            content.innerHTML = html;
            content.style.display = 'block';
        }

        function showError(message) {
            const alert = document.getElementById('errorAlert');
            alert.textContent = message;
            alert.classList.add('active');
        }

        function updateMatchCount() {
            document.getElementById('matchCount').textContent = IPL_MATCHES.length;
        }

        init();
    </script>
</body>
</html>
