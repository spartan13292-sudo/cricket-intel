<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CricIntel — Live Fantasy Dashboard</title>
<style>
body{margin:0;font-family:sans-serif;background:#0b0f14;color:#e6edf3}
nav{background:#111;padding:12px;text-align:center;font-weight:bold}
.container{padding:20px;max-width:1000px;margin:auto}
.card{background:#161b22;border-radius:10px;padding:16px;margin-bottom:16px}
button{background:#00d4aa;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-weight:bold}
select{padding:8px;margin-right:10px}
.result{margin-top:10px;font-size:18px}
</style>
</head>
<body>

<nav>🏏 CricIntel — Fantasy Predictor</nav>

<div class="container">

<div class="card">
<h3>Select Teams</h3>
<select id="team1">
<option>MI</option><option>CSK</option><option>RCB</option><option>KKR</option>
</select>
<select id="team2">
<option>CSK</option><option>MI</option><option>KKR</option><option>RCB</option>
</select>
<button onclick="predictMatch()">Predict</button>

<div class="result" id="result"></div>
</div>

<div class="card">
<h3>Fantasy XI Suggestion</h3>
<ul id="fantasy"></ul>
</div>

<div class="card">
<h3>Pitch Report</h3>
<div id="pitch"></div>
</div>

</div>

<script>

function predictMatch(){
  const t1=document.getElementById('team1').value;
  const t2=document.getElementById('team2').value;

  if(t1===t2){
    document.getElementById('result').innerText="Select different teams";
    return;
  }

  const strength={MI:85,CSK:82,RCB:78,KKR:80};

  let prob1=strength[t1]/(strength[t1]+strength[t2]);
  let prob2=1-prob1;

  const winner=prob1>prob2?t1:t2;

  document.getElementById('result').innerText=
    `${winner} likely to win (${Math.round(Math.max(prob1,prob2)*100)}%)`;

  generateFantasy(t1,t2);
  generatePitch();
}

function generateFantasy(t1,t2){
  const players=[
    "Rohit Sharma","Virat Kohli","Dhoni","Russell",
    "Hardik Pandya","Jadeja","Bumrah","Siraj","Narine","Gill","KL Rahul"
  ];

  let selected=players.sort(()=>0.5-Math.random()).slice(0,11);

  const list=document.getElementById('fantasy');
  list.innerHTML="";

  selected.forEach(p=>{
    const li=document.createElement('li');
    li.innerText=p;
    list.appendChild(li);
  });
}

function generatePitch(){
  const pitches=["Batting friendly","Spin friendly","Balanced pitch","High scoring"];
  const pitch=pitches[Math.floor(Math.random()*pitches.length)];
  document.getElementById('pitch').innerText=pitch;
}

</script>

</body>
</html>
